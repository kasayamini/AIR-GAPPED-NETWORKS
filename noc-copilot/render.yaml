# Render service definition for deploying FastAPI backend
services:
  - type: web
    name: noc-copilot-backend
    env: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OLLAMA_URL
        value: "http://127.0.0.1:11434"
      - key: OLLAMA_MODEL
        value: "llama3.1:latest"
